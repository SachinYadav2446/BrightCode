<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 26" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Creeper Body in high-fidelity pixel art -->
  
  <!-- Head (8x8) at (4,0) -->
  <rect x="4" y="0" width="8" height="8" fill="#55b045"/>
  <rect x="4" y="0" width="2" height="1" fill="#4ba03b"/>
  <rect x="9" y="0" width="1" height="2" fill="#439533"/>
  <rect x="11" y="1" width="1" height="1" fill="#4ba03b"/>
  <rect x="5" y="2" width="2" height="1" fill="#3c8b2c"/>
  <rect x="4" y="4" width="1" height="1" fill="#4ba03b"/>
  <rect x="10" y="5" width="2" height="1" fill="#3c8b2c"/>
  <rect x="4" y="7" width="2" height="1" fill="#4ba03b"/>
  <rect x="9" y="7" width="1" height="1" fill="#4ba03b"/>
  <rect x="6" y="1" width="2" height="1" fill="#67c357"/>
  <rect x="10" y="0" width="1" height="1" fill="#67c357"/>
  <rect x="4" y="3" width="1" height="1" fill="#67c357"/>
  <rect x="9" y="3" width="1" height="1" fill="#5db74d"/>
  <rect x="5" y="5" width="1" height="1" fill="#67c357"/>
  <rect x="11" y="6" width="1" height="1" fill="#67c357"/>
  <rect x="7" y="7" width="2" height="1" fill="#67c357"/>
  
  <!-- Head Face Features -->
  <rect x="5" y="1" width="2" height="2" fill="#0f140d"/>
  <rect x="9" y="1" width="2" height="2" fill="#0f140d"/>
  <rect x="7" y="3" width="2" height="3" fill="#0f140d"/>
  <rect x="6" y="4" width="4" height="3" fill="#0f140d"/>
  <rect x="6" y="6" width="1" height="1" fill="#0f140d"/>
  <rect x="9" y="6" width="1" height="1" fill="#0f140d"/>
  <rect x="5" y="1" width="1" height="1" fill="#000000"/>
  <rect x="9" y="1" width="1" height="1" fill="#000000"/>
  <rect x="7" y="3" width="2" height="1" fill="#000000"/>
  <rect x="6" y="4" width="1" height="2" fill="#000000"/>
  <rect x="9" y="4" width="1" height="2" fill="#000000"/>
  
  <!-- Body (4x12) from x=6, y=8 to x=10, y=20 -->
  <rect x="6" y="8" width="4" height="12" fill="#4ba03b"/>
  <rect x="6" y="9" width="1" height="3" fill="#3c8b2c"/>
  <rect x="9" y="12" width="1" height="4" fill="#3c8b2c"/>
  <rect x="7" y="16" width="2" height="2" fill="#55b045"/>
  <rect x="6" y="18" width="2" height="2" fill="#67c357"/>
  <rect x="8" y="10" width="2" height="3" fill="#67c357"/>
  
  <!-- Left Leg (4x6) at (2,20) to (6,26) -->
  <rect x="2" y="20" width="4" height="6" fill="#3c8b2c"/>
  <rect x="2" y="20" width="2" height="2" fill="#2d6e20"/>
  <rect x="4" y="22" width="2" height="2" fill="#55b045"/>
  <rect x="2" y="24" width="4" height="2" fill="#0f140d"/> <!-- Foot bottom claw -->
  
  <!-- Right Leg (4x6) at (10,20) to (14,26) -->
  <rect x="10" y="20" width="4" height="6" fill="#3c8b2c"/>
  <rect x="12" y="20" width="2" height="2" fill="#2d6e20"/>
  <rect x="10" y="22" width="2" height="2" fill="#55b045"/>
  <rect x="10" y="24" width="4" height="2" fill="#0f140d"/> <!-- Foot bottom claw -->
  
  <!-- Center legs connectors / shadow -->
  <rect x="6" y="20" width="4" height="4" fill="#2d6e20"/>
